version: "2"
linters:
  default: standard
  enable:
    - misspell
  settings:
    gosec:
      excludes:
        - G114
        - G306
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
run:
  timeout: 10m
  modules-download-mode: vendor
